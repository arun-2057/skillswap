<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SkillSwap">
  <defs>
    <linearGradient id="ssGrad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="ssText" x1="118" y1="20" x2="300" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
  </defs>

  <!-- Mark: rounded gradient tile with a skill-swap (two interlocking arrows) -->
  <rect x="4" y="8" width="64" height="64" rx="18" fill="url(#ssGrad)"/>
  <g fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- top/left arrow -->
    <path d="M23 32c0-7 6-12 13-12 5 0 9 3 11 7"/>
    <path d="M47 27l0-6 -6 0"/>
    <!-- bottom/right arrow -->
    <path d="M57 48c0 7-6 12-13 12-5 0-9-3-11-7"/>
    <path d="M33 53l0 6 6 0"/>
  </g>

  <!-- Wordmark -->
  <text x="84" y="51" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="34" font-weight="800" letter-spacing="-0.5">
    <tspan fill="#0F172A">Skill</tspan><tspan fill="url(#ssText)">Swap</tspan>
  </text>
</svg>
